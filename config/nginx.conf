upstream mural_app {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name _;

  # 背景画像を直接配信
  location /images/ {
    alias /var/mural/images/;
    expires 1h;
    add_header Cache-Control "public";
  }

  # フロントエンド静的ファイル
  location /clock/ {
    alias /path/to/mural/public/clock/;
    expires 10m;

    # index.html へのアクセスを / にリダイレクト
    location = /clock {
      return 301 /clock/;
    }
  }

  # Rails API
  location /api/ {
    proxy_pass         http://mural_app;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # ヘルスチェック
  location /up {
    proxy_pass http://mural_app;
    proxy_set_header Host $host;
  }
}
