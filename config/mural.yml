default: &default
  images:
    directory: <%= ENV.fetch("MURAL_IMAGE_DIR", "/var/mural/images") %>
    mode: sequential          # random or sequential
    interval_seconds: 60     # 1分ごとに切替

  display:
    font_family: "Noto Sans JP"
    font_url: "https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap"
    clock_color: "#ffffff"
    date_color: "#eeeeee"
    clock_font_size: "10vw"
    date_font_size: "1.5vw"
    show_seconds: false
    clock_shadow: "0 2px 20px rgba(0,0,0,0.8)"
    position_x: center   # left, center, right
    position_y: bottom   # top, center, bottom

development:
  <<: *default
  images:
    directory: /var/mural/images
    mode: sequential
    interval_seconds: 10

test:
  <<: *default

production:
  <<: *default
